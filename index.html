<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Immersive Weather (WeatherAPI)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@700&display=swap');

        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --accent-hot: #ff4d4d;
            --accent-cold: #4d79ff;
            --accent-mild: #4dff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --error-red: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1.5s ease;
        }

        /* Canvas for Particles */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Main Interface */
        .interface {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: bootUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes bootUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search Bar - Minimalist */
        .search-container {
            margin-bottom: 4rem;
            position: relative;
            display: inline-block;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            padding: 10px 0;
            width: 300px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-bottom-color: var(--text-main);
            width: 320px;
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        /* The Hero Temperature */
        .hero-temp {
            font-family: 'Syncopate', sans-serif;
            font-size: 8rem;
            line-height: 1;
            font-weight: 700;
            letter-spacing: -5px;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
            transition: color 1s ease, text-shadow 1s ease;
        }

        /* Narrative Text */
        .narrative {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 3rem;
            min-height: 1.5em;
        }

        /* Data Grid - Floating Glass */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 2rem;
        }

        .data-item {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 1.5rem 1rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .data-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.07);
        }

        .label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.5rem;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* Loader */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
            display: none;
            z-index: 20;
        }

        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Retry Button */
        .retry-btn {
            margin-top: 1rem;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: none;
        }

        .retry-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero-temp { font-size: 5rem; }
            .data-grid { grid-template-columns: 1fr; }
            input { width: 200px; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="loader" id="loader">INITIALIZING SENSORS...</div>

    <div class="interface" id="interface">
        <div class="search-container">
            <input type="text" id="cityInput" placeholder="Enter City Name..." autocomplete="off">
        </div>

        <div class="hero-temp" id="tempDisplay">--°</div>
        
        <div class="narrative" id="narrativeText">AWAITING INPUT...</div>

        <!-- Retry Button -->
        <button class="retry-btn" id="retryBtn">RETRY CONNECTION</button>

        <div class="data-grid">
            <div class="data-item">
                <span class="label">Wind Velocity</span>
                <span class="value" id="windVal">-- km/h</span>
            </div>
            <div class="data-item">
                <span class="label">Atmosphere</span>
                <span class="value" id="conditionVal">--</span>
            </div>
            <div class="data-item">
                <span class="label">Humidity</span>
                <span class="value" id="humidVal">--%</span>
            </div>
            <div class="data-item">
                <span class="label">Feels Like</span>
                <span class="value" id="feelsLikeVal">--°C</span>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // ⚠️ REPLACE THIS WITH YOUR WEATHERAPI.COM KEY
        const API_KEY = "cb5ec66027fe4511a06160739261805"; 
        const BASE_URL = "https://api.weatherapi.com/v1/current.json"; // Use HTTPS!

        // --- STATE ---
        let particles = [];
        let particleType = 'none'; // 'rain', 'snow', 'embers', 'none'
        let canvas, ctx, width, height;
        let lastCity = ""; // Store last searched city for retry

        // --- DOM ELEMENTS ---
        const cityInput = document.getElementById('cityInput');
        const loader = document.getElementById('loader');
        const interfaceEl = document.getElementById('interface');
        const tempDisplay = document.getElementById('tempDisplay');
        const narrativeText = document.getElementById('narrativeText');
        const windVal = document.getElementById('windVal');
        const conditionVal = document.getElementById('conditionVal');
        const humidVal = document.getElementById('humidVal');
        const feelsLikeVal = document.getElementById('feelsLikeVal');
        const retryBtn = document.getElementById('retryBtn');

        // --- INITIALIZATION ---
        window.addEventListener('load', () => {
            canvas = document.getElementById('particleCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            animateParticles();

            // Check online status
            if (!navigator.onLine) {
                showOfflineError();
                return;
            }

            // Default load only if key is valid
            if (API_KEY && API_KEY !== "YOUR_WEATHERAPI_KEY_HERE") {
                cityInput.value = "London";
                fetchWeather("London");
            } else {
                narrativeText.textContent = "ERROR: MISSING OR INVALID API KEY IN CODE";
                narrativeText.style.color = "#ff4d4d";
                console.error("Please replace 'YOUR_WEATHERAPI_KEY_HERE' with your actual WeatherAPI.com key.");
            }
        });

        // Listen for online/offline events
        window.addEventListener('online', () => {
            narrativeText.textContent = "CONNECTION RESTORED. RETRYING...";
            narrativeText.style.color = "#4dff88";
            if (lastCity) {
                setTimeout(() => fetchWeather(lastCity), 1000);
            }
        });

        window.addEventListener('offline', showOfflineError);

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) fetchWeather(city);
            }
        });

        retryBtn.addEventListener('click', () => {
            if (lastCity) {
                fetchWeather(lastCity);
            } else {
                fetchWeather(cityInput.value.trim() || "London");
            }
        });

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function showOfflineError() {
            narrativeText.textContent = "NO INTERNET CONNECTION.";
            narrativeText.style.color = "#ff4d4d";
            retryBtn.style.display = "inline-block";
            loader.style.display = "none";
            interfaceEl.style.opacity = "1";
        }

        // --- CORE LOGIC ---
        async function fetchWeather(city) {
            if (!API_KEY || API_KEY === "YOUR_WEATHERAPI_KEY_HERE") {
                alert("Please open the HTML file and insert your WeatherAPI.com key in the JavaScript section.");
                return;
            }

            lastCity = city; // Save for retry
            interfaceEl.style.opacity = '0.2';
            loader.style.display = 'block';
            retryBtn.style.display = "none";
            narrativeText.style.color = "rgba(255,255,255,0.6)";

            try {
                // Check if online
                if (!navigator.onLine) {
                    throw new Error("NetworkError: No internet connection");
                }

                // Fetch from WeatherAPI
                const url = `${BASE_URL}?key=${API_KEY}&q=${encodeURIComponent(city)}&aqi=no`;
                console.log("🌐 Requesting:", url);

                const response = await fetch(url, { timeout: 10000 }); // 10 sec timeout
                console.log("📡 Response Status:", response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("❌ API Error:", errorText);
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const data = await response.json();
                console.log("✅ Data Received:", data);

                // Extract Data
                const location = data.location;
                const current = data.current;
                const condition = current.condition;

                updateUI(location.name, location.country, current, condition);
                setAtmosphere(condition.text, current.temp_c);

            } catch (err) {
                console.error(" Fetch Error:", err);
                let errorMsg = "SIGNAL LOST.";

                if (err.message.includes("401")) {
                    errorMsg = "INVALID API KEY. CHECK CODE.";
                } else if (err.message.includes("400")) {
                    errorMsg = "CITY NOT FOUND. TRY AGAIN.";
                } else if (err.message.includes("403")) {
                    errorMsg = "KEY NOT ACTIVE YET. WAIT 2 HOURS.";
                } else if (err.message.includes("NetworkError") || err.message.includes("Failed to fetch") || !navigator.onLine) {
                    errorMsg = "NO INTERNET CONNECTION.";
                    showOfflineError();
                    return; // Don't hide loader yet
                } else if (err.message.includes("timeout")) {
                    errorMsg = "REQUEST TIMED OUT. TRY AGAIN.";
                } else {
                    errorMsg = "UNKNOWN ERROR. CHECK CONSOLE.";
                }

                narrativeText.textContent = errorMsg;
                narrativeText.style.color = "#ff4d4d";
                particleType = 'none';
                particles = [];
            } finally {
                loader.style.display = 'none';
                interfaceEl.style.opacity = '1';
            }
        }

        function updateUI(city, country, current, conditionObj) {
            // Temp
            tempDisplay.textContent = `${Math.round(current.temp_c)}°`;
            
            // Feels Like
            feelsLikeVal.textContent = `${Math.round(current.feelslike_c)}°C`;

            // Narrative Storytelling
            const stories = getStory(conditionObj.text, current.temp_c);
            narrativeText.textContent = stories.line;
            narrativeText.style.color = stories.color;

            // Data
            windVal.textContent = `${current.wind_kph} km/h ${current.wind_dir}`;
            conditionVal.textContent = conditionObj.text;
            humidVal.textContent = `${current.humidity}%`;

            // Dynamic Color for Temp
            const hue = current.temp_c > 20 ? 0 : (current.temp_c < 10 ? 220 : 140);
            tempDisplay.style.textShadow = `0 0 40px hsla(${hue}, 100%, 50%, 0.4)`;
        }

        // --- STORYTELLING ENGINE ---
        function getStory(conditionText, temp) {
            const lowerText = conditionText.toLowerCase();

            if (lowerText.includes("sunny") || lowerText.includes("clear")) 
                return { line: "THE VOID IS ILLUMINATED.", color: "#fff" };
            
            if (lowerText.includes("cloud") || lowerText.includes("overcast")) 
                return { line: "VISION OBSCURED BY VAPOR.", color: "#aaa" };
            
            if (lowerText.includes("fog") || lowerText.includes("mist")) 
                return { line: "VISIBILITY COMPROMISED.", color: "#ccc" };
            
            if (lowerText.includes("rain") || lowerText.includes("drizzle")) 
                return { line: "THE ATMOSPHERE IS WEEPING.", color: "#4d79ff" };
            
            if (lowerText.includes("snow") || lowerText.includes("blizzard")) 
                return { line: "FROZEN PARTICLES DESCEND.", color: "#fff" };
            
            if (lowerText.includes("thunder") || lowerText.includes("storm")) 
                return { line: "ELECTRICAL CHAOS IMMINENT.", color: "#ffff00" };
            
            return { line: "ATMOSPHERIC DATA RECEIVED.", color: "#fff" };
        }

        // --- PARTICLE ENGINE ---
        function setAtmosphere(conditionText, temp) {
            particles = [];
            particleType = 'none';
            const lowerText = conditionText.toLowerCase();

            // Determine Type based on WeatherAPI text descriptions
            if (lowerText.includes("rain") || lowerText.includes("drizzle")) {
                particleType = 'rain';
            } else if (lowerText.includes("snow") || lowerText.includes("blizzard")) {
                particleType = 'snow';
            } else if (lowerText.includes("thunder") || lowerText.includes("storm")) {
                particleType = 'embers'; // Chaos mode
            }
            
            // Init Particles
            const count = particleType === 'none' ? 0 : 150;
            for (let i = 0; i < count; i++) {
                particles.push(createParticle());
            }
        }

        function createParticle() {
            return {
                x: Math.random() * width,
                y: Math.random() * height,
                speed: Math.random() * 5 + 2,
                length: Math.random() * 20 + 10,
                size: Math.random() * 2 + 1
            };
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            
            if (particleType !== 'none') {
                ctx.fillStyle = particleType === 'snow' ? 'rgba(255,255,255,0.8)' : 
                                particleType === 'rain' ? 'rgba(174, 194, 224, 0.5)' : 
                                'rgba(255, 100, 0, 0.6)';

                particles.forEach(p => {
                    ctx.beginPath();
                    
                    if (particleType === 'rain') {
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x, p.y + p.length);
                        ctx.strokeStyle = ctx.fillStyle;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        p.y += p.speed * 2;
                    } else if (particleType === 'snow') {
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        p.y += p.speed * 0.5;
                        p.x += Math.sin(p.y * 0.01) * 0.5;
                    } else if (particleType === 'embers') {
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        p.y -= p.speed;
                        p.x += (Math.random() - 0.5) * 2;
                    }

                    // Reset if out of bounds
                    if (p.y > height) { p.y = -20; p.x = Math.random() * width; }
                    if (p.y < 0) { p.y = height + 20; p.x = Math.random() * width; }
                });
            }

            requestAnimationFrame(animateParticles);
        }
    </script>
</body>
</html>
