<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Immersive Weather Ultimate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@700&display=swap');

        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --accent-hot: #ff4d4d;
            --accent-cold: #4d79ff;
            --accent-mild: #4dff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --error-red: #ff4d4d;
            --card-bg: rgba(255,255,255,0.05);
            --gradient-start: #0f0c29;
            --gradient-end: #302b63;
        }

        /* Light Mode Overrides */
        body.light-mode {
            --bg-color: #f0f2f5;
            --text-main: #1a1a1a;
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.08);
            --card-bg: rgba(0,0,0,0.05);
            --gradient-start: #e0eafc;
            --gradient-end: #cfdef3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 2s ease, color 1.5s ease;
        }

        /* Canvas for Particles */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Main Interface */
        .interface {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: bootUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes bootUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Controls */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .control-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        /* Search Bar - Minimalist */
        .search-container {
            margin-bottom: 3rem;
            position: relative;
            display: inline-block;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            padding: 10px 0;
            width: 300px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-bottom-color: var(--text-main);
            width: 320px;
        }

        input::placeholder { color: rgba(128,128,128,0.5); }

        /* The Hero Temperature */
        .hero-temp {
            font-family: 'Syncopate', sans-serif;
            font-size: 8rem;
            line-height: 1;
            font-weight: 700;
            letter-spacing: -5px;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(128,128,128,0.1);
            transition: color 1s ease, text-shadow 1s ease;
        }

        /* Narrative Text */
        .narrative {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(128,128,128,0.7);
            margin-bottom: 1rem;
            min-height: 1.5em;
        }

        /* Astro Info */
        .astro-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .astro-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .astro-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(128,128,128,0.6);
            margin-bottom: 0.3rem;
        }

        .astro-value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Data Grid - Floating Glass */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 2rem;
        }

        .data-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem 1rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .data-item:hover {
            transform: translateY(-5px);
            background: rgba(128,128,128,0.1);
        }

        .label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(128,128,128,0.6);
            margin-bottom: 0.5rem;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* Forecast Sections */
        .forecast-section {
            margin-top: 4rem;
            width: 100%;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 2px;
        }

        .hourly-grid, .daily-grid {
            display: grid;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 1rem;
        }

        .hourly-grid {
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        }

        .daily-grid {
            grid-template-columns: repeat(3, 1fr);
        }

        .forecast-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s ease;
            min-width: 120px;
        }

        .forecast-card:hover {
            transform: scale(1.05);
        }

        .forecast-time, .forecast-date {
            font-size: 0.9rem;
            color: rgba(128,128,128,0.7);
            margin-bottom: 0.5rem;
        }

        .forecast-temp {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .forecast-condition {
            font-size: 0.9rem;
            color: rgba(128,128,128,0.8);
        }

        /* Loader */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
            display: none;
            z-index: 20;
        }

        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Retry Button */
        .retry-btn {
            margin-top: 1rem;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: none;
        }

        .retry-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero-temp { font-size: 5rem; }
            .data-grid { grid-template-columns: repeat(2, 1fr); }
            .daily-grid { grid-template-columns: 1fr; }
            input { width: 200px; }
        }

        @media (max-width: 500px) {
            .data-grid { grid-template-columns: 1fr; }
            .top-controls { flex-direction: column; gap: 10px; }
            .astro-info { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="loader" id="loader">INITIALIZING SENSORS...</div>

    <div class="interface" id="interface">
        <!-- Top Controls -->
        <div class="top-controls">
            <button class="control-btn" id="geoBtn">📍 Detect My Location</button>
            <button class="control-btn" id="themeToggle">🌙 Toggle Theme</button>
            <button class="control-btn" id="voiceBtn">🔊 Read Aloud</button>
        </div>

        <!-- Search -->
        <div class="search-container">
            <input type="text" id="cityInput" placeholder="Enter City Name..." autocomplete="off">
        </div>

        <!-- Hero Temp -->
        <div class="hero-temp" id="tempDisplay">--°</div>
        
        <!-- Narrative -->
        <div class="narrative" id="narrativeText">AWAITING INPUT...</div>

        <!-- Astro Info -->
        <div class="astro-info">
            <div class="astro-item">
                <div class="astro-label">Sunrise</div>
                <div class="astro-value" id="sunriseVal">--:--</div>
            </div>
            <div class="astro-item">
                <div class="astro-label">Sunset</div>
                <div class="astro-value" id="sunsetVal">--:--</div>
            </div>
            <div class="astro-item">
                <div class="astro-label">Moon Phase</div>
                <div class="astro-value" id="moonPhaseVal">--</div>
            </div>
            <div class="astro-item">
                <div class="astro-label">Illumination</div>
                <div class="astro-value" id="illuminationVal">--%</div>
            </div>
        </div>

        <!-- Retry Button -->
        <button class="retry-btn" id="retryBtn">RETRY CONNECTION</button>

        <!-- Current Weather Stats -->
        <div class="data-grid">
            <div class="data-item">
                <span class="label">Wind Velocity</span>
                <span class="value" id="windVal">-- km/h</span>
            </div>
            <div class="data-item">
                <span class="label">Atmosphere</span>
                <span class="value" id="conditionVal">--</span>
            </div>
            <div class="data-item">
                <span class="label">Humidity</span>
                <span class="value" id="humidVal">--%</span>
            </div>
            <div class="data-item">
                <span class="label">Feels Like</span>
                <span class="value" id="feelsLikeVal">--°C</span>
            </div>
        </div>

        <!-- Hourly Forecast -->
        <div class="forecast-section">
            <h2 class="section-title">HOURLY FORECAST (NEXT 24H)</h2>
            <div class="hourly-grid" id="hourlyGrid">
                <!-- Hourly cards injected here -->
            </div>
        </div>

        <!-- 3-Day Forecast -->
        <div class="forecast-section">
            <h2 class="section-title">3-DAY FORECAST</h2>
            <div class="daily-grid" id="dailyGrid">
                <!-- Daily cards injected here -->
            </div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="rainSound" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=rain-and-thunder-16705.mp3" type="audio/mpeg">
    </audio>
    <audio id="windSound" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_c8c8a73467.mp3?filename=wind-blowing-sfx-12897.mp3" type="audio/mpeg">
    </audio>
    <audio id="thunderSound" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c9c9a73467.mp3?filename=thunderstorm-14732.mp3" type="audio/mpeg">
    </audio>
    <audio id="calmSound" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=calm-ambient-14732.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- CONFIGURATION ---
        // ⚠️ IMPORTANT: REPLACE THIS WITH YOUR OWN KEY FROM https://www.weatherapi.com/
        // The key below is likely invalid or expired.
        const API_KEY = "YOUR_API_KEY_HERE"; 
        const BASE_URL_FORECAST = "https://api.weatherapi.com/v1/forecast.json";

        // --- STATE ---
        let particles = [];
        let particleType = 'none';
        let canvas, ctx, width, height;
        let lastCity = "";
        let currentAudio = null;
        let speechSynthesis = window.speechSynthesis;

        // --- DOM ELEMENTS ---
        const cityInput = document.getElementById('cityInput');
        const loader = document.getElementById('loader');
        const interfaceEl = document.getElementById('interface');
        const tempDisplay = document.getElementById('tempDisplay');
        const narrativeText = document.getElementById('narrativeText');
        const windVal = document.getElementById('windVal');
        const conditionVal = document.getElementById('conditionVal');
        const humidVal = document.getElementById('humidVal');
        const feelsLikeVal = document.getElementById('feelsLikeVal');
        const retryBtn = document.getElementById('retryBtn');
        const geoBtn = document.getElementById('geoBtn');
        const themeToggle = document.getElementById('themeToggle');
        const voiceBtn = document.getElementById('voiceBtn');
        const hourlyGrid = document.getElementById('hourlyGrid');
        const dailyGrid = document.getElementById('dailyGrid');
        const sunriseVal = document.getElementById('sunriseVal');
        const sunsetVal = document.getElementById('sunsetVal');
        const moonPhaseVal = document.getElementById('moonPhaseVal');
        const illuminationVal = document.getElementById('illuminationVal');

        // Audio elements
        const rainSound = document.getElementById('rainSound');
        const windSound = document.getElementById('windSound');
        const thunderSound = document.getElementById('thunderSound');
        const calmSound = document.getElementById('calmSound');

        // --- INITIALIZATION ---
        window.addEventListener('load', () => {
            canvas = document.getElementById('particleCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            animateParticles();

            if (!navigator.onLine) {
                showOfflineError();
                return;
            }

            // Check if user has replaced the placeholder key
            if (API_KEY && API_KEY !== "YOUR_API_KEY_HERE") {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            fetchWeatherByCoords(latitude, longitude);
                        },
                        (error) => {
                            console.log("Geolocation denied or failed, loading London...");
                            cityInput.value = "London";
                            fetchWeather("London");
                        }
                    );
                } else {
                    cityInput.value = "London";
                    fetchWeather("London");
                }
            } else {
                narrativeText.textContent = "ERROR: PLEASE ADD API KEY IN CODE";
                narrativeText.style.color = "#ff4d4d";
                alert("Please open the HTML file in a text editor and replace 'YOUR_API_KEY_HERE' with a valid key from weatherapi.com");
            }
        });

        // Event Listeners
        window.addEventListener('online', () => {
            narrativeText.textContent = "CONNECTION RESTORED. RETRYING...";
            narrativeText.style.color = "#4dff88";
            if (lastCity) setTimeout(() => fetchWeather(lastCity), 1000);
        });

        window.addEventListener('offline', showOfflineError);

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) fetchWeather(city);
            }
        });

        retryBtn.addEventListener('click', () => {
            if (lastCity) fetchWeather(lastCity);
            else fetchWeather(cityInput.value.trim() || "London");
        });

        geoBtn.addEventListener('click', () => {
            if (navigator.geolocation) {
                narrativeText.textContent = "DETECTING LOCATION...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        fetchWeatherByCoords(latitude, longitude);
                    },
                    (error) => {
                        narrativeText.textContent = "LOCATION ACCESS DENIED.";
                        narrativeText.style.color = "#ff4d4d";
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        });

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            themeToggle.textContent = isLight ? "☀️ Toggle Theme" : "🌙 Toggle Theme";
            updateBackgroundGradient(isLight);
        });

        voiceBtn.addEventListener('click', () => {
            speakCurrentWeather();
        });

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function showOfflineError() {
            narrativeText.textContent = "NO INTERNET CONNECTION.";
            narrativeText.style.color = "#ff4d4d";
            retryBtn.style.display = "inline-block";
            loader.style.display = "none";
            interfaceEl.style.opacity = "1";
        }

        // --- CORE LOGIC ---
        async function fetchWeatherByCoords(lat, lon) {
            lastCity = `${lat},${lon}`;
            await fetchWeatherData(`${BASE_URL_FORECAST}?key=${API_KEY}&q=${lat},${lon}&days=3&aqi=no`, true);
        }

        async function fetchWeather(city) {
            if (!API_KEY || API_KEY === "YOUR_API_KEY_HERE") {
                alert("Please open the HTML file and insert your WeatherAPI.com key in the JavaScript section.");
                return;
            }

            lastCity = city;
            await fetchWeatherData(`${BASE_URL_FORECAST}?key=${API_KEY}&q=${encodeURIComponent(city)}&days=3&aqi=no`, false);
        }

        async function fetchWeatherData(url, isCoords) {
            interfaceEl.style.opacity = '0.2';
            loader.style.display = 'block';
            retryBtn.style.display = "none";
            narrativeText.style.color = "rgba(128,128,128,0.7)";

            try {
                if (!navigator.onLine) throw new Error("NetworkError: No internet connection");

                console.log("🌐 Requesting:", url);
                const response = await fetch(url, { timeout: 10000 });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("❌ API Error:", errorText);
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const data = await response.json();
                
                // Safety check: Ensure we got valid data structure
                if (!data.location || !data.current || !data.forecast) {
                    throw new Error("Invalid Data Structure received from API");
                }

                const location = data.location;
                const current = data.current;
                const forecast = data.forecast;
                
                // Safety check for forecast days
                if (!forecast.forecastday || forecast.forecastday.length === 0) {
                     throw new Error("No forecast data available for this location.");
                }

                const astro = forecast.forecastday[0].astro;

                // Update UI
                updateUI(location.name, location.country, current, astro);
                setAtmosphere(current.condition.text, current.temp_c);
                renderHourlyForecast(forecast.forecastday[0].hour);
                renderDailyForecast(forecast.forecastday);

                if (!isCoords) cityInput.value = location.name;

            } catch (err) {
                console.error(" Fetch Error:", err);
                handleFetchError(err);
            } finally {
                loader.style.display = 'none';
                interfaceEl.style.opacity = '1';
            }
        }

        function handleFetchError(err) {
    console.error("Weather Fetch Error:", err); // Always log to console for debugging

    let userMessage = "";
    let shouldShowRetry = true;

    if (err.message.includes("401")) {
        userMessage = "API Key Invalid — Please Check Configuration";
    } else if (err.message.includes("400")) {
        userMessage = "City Not Found — Try Another Name";
    } else if (err.message.includes("403")) {
        userMessage = "API Access Restricted — Contact Support";
    } else if (err.message.includes("NetworkError") || !navigator.onLine) {
        showOfflineError(); // This already handles offline state nicely
        return;
    } else if (err.message.includes("timeout")) {
        userMessage = "Request Timed Out — Retrying...";
        setTimeout(() => {
            if (lastCity) fetchWeather(lastCity);
        }, 2000);
        shouldShowRetry = false; // Auto-retrying, no need for button
    } else {
        // For unknown errors: don't show anything scary to user
        userMessage = "Atmospheric Signal Unstable...";
        // Optionally auto-retry after delay
        setTimeout(() => {
            if (lastCity) fetchWeather(lastCity);
        }, 3000);
        shouldShowRetry = false;
    }

    // Only update narrative if we have a meaningful message
    if (userMessage) {
        narrativeText.textContent = userMessage;
        narrativeText.style.color = "rgba(255, 77, 77, 0.8)"; // Softer red
    } else {
        // Fallback: keep last known good state or show neutral
        narrativeText.textContent = "Awaiting Atmospheric Data...";
        narrativeText.style.color = "rgba(128,128,128,0.6)";
    }

    particleType = 'none';
    particles = [];

    if (shouldShowRetry) {
        retryBtn.style.display = "inline-block";
    } else {
        retryBtn.style.display = "none";
    }
}

        function updateUI(city, country, current, astro) {
            tempDisplay.textContent = `${Math.round(current.temp_c)}°`;
            feelsLikeVal.textContent = `${Math.round(current.feelslike_c)}°C`;

            const stories = getStory(current.condition.text, current.temp_c);
            narrativeText.textContent = stories.line;
            narrativeText.style.color = stories.color;

            windVal.textContent = `${current.wind_kph} km/h ${current.wind_dir}`;
            conditionVal.textContent = current.condition.text;
            humidVal.textContent = `${current.humidity}%`;

            // Astro
            sunriseVal.textContent = astro.sunrise;
            sunsetVal.textContent = astro.sunset;
            moonPhaseVal.textContent = astro.moon_phase;
            illuminationVal.textContent = `${astro.moon_illumination}%`;

            // Dynamic Color for Temp
            const hue = current.temp_c > 20 ? 0 : (current.temp_c < 10 ? 220 : 140);
            tempDisplay.style.textShadow = `0 0 40px hsla(${hue}, 100%, 50%, 0.4)`;

            // Update background gradient based on time of day
            const hour = new Date().getHours();
            const isNight = hour < 6 || hour > 18;
            updateBackgroundGradient(document.body.classList.contains('light-mode'), isNight, current.condition.text);
        }

        function updateBackgroundGradient(isLightMode, isNight, conditionText) {
            const root = document.documentElement;
            
            if (isLightMode) {
                if (isNight) {
                    root.style.setProperty('--gradient-start', '#2c3e50');
                    root.style.setProperty('--gradient-end', '#4ca1af');
                } else {
                    root.style.setProperty('--gradient-start', '#e0eafc');
                    root.style.setProperty('--gradient-end', '#cfdef3');
                }
            } else {
                if (conditionText.toLowerCase().includes('rain')) {
                    root.style.setProperty('--gradient-start', '#0f0c29');
                    root.style.setProperty('--gradient-end', '#302b63');
                } else if (conditionText.toLowerCase().includes('snow')) {
                    root.style.setProperty('--gradient-start', '#1e3c72');
                    root.style.setProperty('--gradient-end', '#2a5298');
                } else if (conditionText.toLowerCase().includes('thunder')) {
                    root.style.setProperty('--gradient-start', '#232526');
                    root.style.setProperty('--gradient-end', '#414345');
                } else if (isNight) {
                    root.style.setProperty('--gradient-start', '#0f0c29');
                    root.style.setProperty('--gradient-end', '#302b63');
                } else {
                    root.style.setProperty('--gradient-start', '#11998e');
                    root.style.setProperty('--gradient-end', '#38ef7d');
                }
            }
        }

        function renderHourlyForecast(hourlyData) {
            hourlyGrid.innerHTML = '';
            const now = new Date();
            const currentHour = now.getHours();

            // Show next 24 hours starting from current hour
            for (let i = 0; i < 24; i++) {
                const hourIndex = (currentHour + i) % 24;
                // Safety check if hour exists
                if(!hourlyData[hourIndex]) continue;

                const hourData = hourlyData[hourIndex];
                const time = new Date(hourData.time);
                const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const temp = Math.round(hourData.temp_c);
                const condition = hourData.condition.text;
                const iconUrl = hourData.condition.icon.replace('64x64', '128x128');

                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-time">${i === 0 ? 'Now' : timeStr}</div>
                    <img src="${iconUrl}" alt="${condition}" style="width: 48px; height: 48px; margin: 5px 0;">
                    <div class="forecast-temp">${temp}°</div>
                    <div class="forecast-condition">${condition.split(' ')[0]}</div>
                `;
                hourlyGrid.appendChild(card);
            }
        }

        function renderDailyForecast(dailyData) {
            dailyGrid.innerHTML = '';
            
            dailyData.forEach((day, index) => {
                const date = new Date(day.date);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'long' });
                const maxTemp = Math.round(day.day.maxtemp_c);
                const minTemp = Math.round(day.day.mintemp_c);
                const condition = day.day.condition.text;
                const iconUrl = day.day.condition.icon.replace('64x64', '128x128');

                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-date">${index === 0 ? 'Today' : dayName}</div>
                    <img src="${iconUrl}" alt="${condition}" style="width: 64px; height: 64px; margin: 10px 0;">
                    <div class="forecast-temp">${maxTemp}° / ${minTemp}°</div>
                    <div class="forecast-condition">${condition}</div>
                `;
                dailyGrid.appendChild(card);
            });
        }

        // --- STORYTELLING ENGINE ---
        function getStory(conditionText, temp) {
            const lowerText = conditionText.toLowerCase();

            if (lowerText.includes("sunny") || lowerText.includes("clear")) 
                return { line: "THE VOID IS ILLUMINATED.", color: "#fff" };
            if (lowerText.includes("cloud") || lowerText.includes("overcast")) 
                return { line: "VISION OBSCURED BY VAPOR.", color: "#aaa" };
            if (lowerText.includes("fog") || lowerText.includes("mist")) 
                return { line: "VISIBILITY COMPROMISED.", color: "#ccc" };
            if (lowerText.includes("rain") || lowerText.includes("drizzle")) 
                return { line: "THE ATMOSPHERE IS WEEPING.", color: "#4d79ff" };
            if (lowerText.includes("snow") || lowerText.includes("blizzard")) 
                return { line: "FROZEN PARTICLES DESCEND.", color: "#fff" };
            if (lowerText.includes("thunder") || lowerText.includes("storm")) 
                return { line: "ELECTRICAL CHAOS IMMINENT.", color: "#ffff00" };
            return { line: "ATMOSPHERIC DATA RECEIVED.", color: "#fff" };
        }

        // --- PARTICLE ENGINE ---
        function setAtmosphere(conditionText, temp) {
            particles = [];
            particleType = 'none';
            const lowerText = conditionText.toLowerCase();

            if (lowerText.includes("rain") || lowerText.includes("drizzle")) {
                particleType = 'rain';
                playSound(rainSound);
            } else if (lowerText.includes("snow") || lowerText.includes("blizzard")) {
                particleType = 'snow';
                playSound(windSound);
            } else if (lowerText.includes("thunder") || lowerText.includes("storm")) {
                particleType = 'embers';
                playSound(thunderSound);
            } else {
                playSound(calmSound);
            }
            
            const count = particleType === 'none' ? 0 : 150;
            for (let i = 0; i < count; i++) {
                particles.push(createParticle());
            }
        }

        function createParticle() {
            return {
                x: Math.random() * width,
                y: Math.random() * height,
                speed: Math.random() * 5 + 2,
                length: Math.random() * 20 + 10,
                size: Math.random() * 2 + 1
            };
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            
            if (particleType !== 'none') {
                ctx.fillStyle = particleType === 'snow' ? 'rgba(255,255,255,0.8)' : 
                                particleType === 'rain' ? 'rgba(174, 194, 224, 0.5)' : 
                                'rgba(255, 100, 0, 0.6)';

                particles.forEach(p => {
                    ctx.beginPath();
                    
                    if (particleType === 'rain') {
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x, p.y + p.length);
                        ctx.strokeStyle = ctx.fillStyle;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        p.y += p.speed * 2;
                    } else if (particleType === 'snow') {
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        p.y += p.speed * 0.5;
                        p.x += Math.sin(p.y * 0.01) * 0.5;
                    } else if (particleType === 'embers') {
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        p.y -= p.speed;
                        p.x += (Math.random() - 0.5) * 2;
                    }

                    if (p.y > height) { p.y = -20; p.x = Math.random() * width; }
                    if (p.y < 0) { p.y = height + 20; p.x = Math.random() * width; }
                });
            }

            requestAnimationFrame(animateParticles);
        }

        // --- AUDIO ENGINE ---
        function playSound(audioElement) {
            if (currentAudio && currentAudio !== audioElement) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            if (audioElement.paused) {
                audioElement.volume = 0.3;
                audioElement.play().catch(e => {
                    console.log("Audio playback failed (user interaction required):", e);
                });
                currentAudio = audioElement;
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && currentAudio) currentAudio.pause();
            else if (!document.hidden && currentAudio) currentAudio.play().catch(e => {});
        });

        // --- VOICE NARRATION ---
        function speakCurrentWeather() {
            if (!speechSynthesis) {
                alert("Voice synthesis not supported in this browser.");
                return;
            }

            const city = cityInput.value || "your location";
            const temp = tempDisplay.textContent;
            const condition = conditionVal.textContent;
            const wind = windVal.textContent;
            const humidity = humidVal.textContent;

            const utterance = new SpeechSynthesisUtterance(
                `Currently in ${city}, it's ${condition} with a temperature of ${temp}. 
                 Wind speed is ${wind}, and humidity is ${humidity}. 
                 ${narrativeText.textContent}`
            );

            utterance.rate = 0.9; // Slightly slower for clarity
            utterance.pitch = 1;
            speechSynthesis.cancel(); // Stop any ongoing speech
            speechSynthesis.speak(utterance);
        }
    </script>
