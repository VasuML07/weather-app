<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Immersive Weather</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@700&display=swap');

        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --accent-hot: #ff4d4d;
            --accent-cold: #4d79ff;
            --accent-mild: #4dff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1.5s ease;
        }

        /* Canvas for Particles */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Main Interface */
        .interface {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: bootUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes bootUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search Bar - Minimalist */
        .search-container {
            margin-bottom: 4rem;
            position: relative;
            display: inline-block;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            padding: 10px 0;
            width: 300px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-bottom-color: var(--text-main);
            width: 320px;
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        /* The Hero Temperature */
        .hero-temp {
            font-family: 'Syncopate', sans-serif;
            font-size: 8rem;
            line-height: 1;
            font-weight: 700;
            letter-spacing: -5px;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
            transition: color 1s ease, text-shadow 1s ease;
        }

        /* Narrative Text */
        .narrative {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 3rem;
            min-height: 1.5em;
        }

        /* Data Grid - Floating Glass */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 2rem;
        }

        .data-item {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 1.5rem 1rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .data-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.07);
        }

        .label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.5rem;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* Loader */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
            display: none;
        }

        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Responsive */
        @media (max-width: 600px) {
            .hero-temp { font-size: 5rem; }
            .data-grid { grid-template-columns: 1fr; }
            input { width: 200px; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="loader" id="loader">INITIALIZING SENSORS...</div>

    <div class="interface" id="interface">
        <div class="search-container">
            <input type="text" id="cityInput" placeholder="Enter coordinates (City Name)" autocomplete="off">
        </div>

        <div class="hero-temp" id="tempDisplay">--°</div>
        
        <div class="narrative" id="narrativeText">AWAITING INPUT...</div>

        <div class="data-grid">
            <div class="data-item">
                <span class="label">Wind Velocity</span>
                <span class="value" id="windVal">-- km/h</span>
            </div>
            <div class="data-item">
                <span class="label">Atmosphere</span>
                <span class="value" id="conditionVal">--</span>
            </div>
            <div class="data-item">
                <span class="label">Elevation</span>
                <span class="value" id="elevVal">-- m</span>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GEO_API = 'https://geocoding-api.open-meteo.com/v1/search';
        const WEATHER_API = 'https://api.open-meteo.com/v1/forecast';

        // --- STATE ---
        let particles = [];
        let particleType = 'none'; // 'rain', 'snow', 'embers', 'none'
        let canvas, ctx, width, height;

        // --- DOM ELEMENTS ---
        const cityInput = document.getElementById('cityInput');
        const loader = document.getElementById('loader');
        const interfaceEl = document.getElementById('interface');
        const tempDisplay = document.getElementById('tempDisplay');
        const narrativeText = document.getElementById('narrativeText');
        const windVal = document.getElementById('windVal');
        const conditionVal = document.getElementById('conditionVal');
        const elevVal = document.getElementById('elevVal');

        // --- INITIALIZATION ---
        window.addEventListener('load', () => {
            canvas = document.getElementById('particleCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            animateParticles();
            
            // Default load
            cityInput.value = "Tokyo";
            fetchWeather("Tokyo");
        });

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchWeather(cityInput.value);
        });

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        // --- CORE LOGIC ---
        async function fetchWeather(city) {
            interfaceEl.style.opacity = '0.2';
            loader.style.display = 'block';
            
            try {
                // 1. Geocoding
                const geoRes = await fetch(`${GEO_API}?name=${city}&count=1&language=en&format=json`);
                const geoData = await geoRes.json();
                
                if (!geoData.results) throw new Error("Location Unknown");
                
                const { latitude, longitude, name, country, elevation } = geoData.results[0];

                // 2. Weather
                const weatherRes = await fetch(`${WEATHER_API}?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const data = await weatherRes.json();
                const current = data.current_weather;

                updateUI(name, country, current, elevation);
                setAtmosphere(current.weathercode, current.temperature);

            } catch (err) {
                narrativeText.textContent = "SIGNAL LOST. CHECK COORDINATES.";
                narrativeText.style.color = "#ff4d4d";
            } finally {
                loader.style.display = 'none';
                interfaceEl.style.opacity = '1';
            }
        }

        function updateUI(city, country, current, elevation) {
            // Temp
            tempDisplay.textContent = `${Math.round(current.temperature)}°`;
            
            // Narrative Storytelling
            const stories = getStory(current.weathercode, current.temperature);
            narrativeText.textContent = stories.line;
            narrativeText.style.color = stories.color;

            // Data
            windVal.textContent = `${current.windspeed} km/h`;
            conditionVal.textContent = getConditionName(current.weathercode);
            elevVal.textContent = `${elevation} m`;

            // Dynamic Color for Temp
            const hue = current.temperature > 20 ? 0 : (current.temperature < 10 ? 220 : 140);
            tempDisplay.style.textShadow = `0 0 40px hsla(${hue}, 100%, 50%, 0.4)`;
        }

        // --- STORYTELLING ENGINE ---
        function getStory(code, temp) {
            if (code <= 1) return { line: "THE SKY IS CLEAR. THE VOID STARES BACK.", color: "#fff" };
            if (code <= 3) return { line: "CLOUDS OBSCURE THE VISION.", color: "#aaa" };
            if (code <= 48) return { line: "VISIBILITY COMPROMISED BY FOG.", color: "#ccc" };
            if (code <= 67) return { line: "THE ATMOSPHERE IS WEEPING.", color: "#4d79ff" }; // Rain
            if (code <= 77) return { line: "FROZEN PARTICLES DESCEND.", color: "#fff" }; // Snow
            if (code <= 82) return { line: "VIOLENT DISCHARGE DETECTED.", color: "#ff4d4d" }; // Showers
            if (code >= 95) return { line: "ELECTRICAL CHAOS IMMINENT.", color: "#ffff00" }; // Thunder
            
            return { line: "DATA CORRUPTED.", color: "#fff" };
        }

        function getConditionName(code) {
            const codes = {
                0: "Clear", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
                45: "Fog", 48: "Fog",
                51: "Drizzle", 53: "Drizzle", 55: "Drizzle",
                61: "Rain", 63: "Rain", 65: "Rain",
                71: "Snow", 73: "Snow", 75: "Snow",
                95: "Thunderstorm", 96: "Thunderstorm", 99: "Thunderstorm"
            };
            return codes[code] || "Unknown";
        }

        // --- PARTICLE ENGINE ---
        function setAtmosphere(code, temp) {
            particles = [];
            particleType = 'none';

            // Determine Type
            if (code >= 51 && code <= 67) particleType = 'rain';
            else if (code >= 71 && code <= 77) particleType = 'snow';
            else if (code >= 95) particleType = 'embers'; // Chaos mode for thunderstorms
            
            // Init Particles
            const count = particleType === 'none' ? 0 : 150;
            for (let i = 0; i < count; i++) {
                particles.push(createParticle());
            }
        }

        function createParticle() {
            return {
                x: Math.random() * width,
                y: Math.random() * height,
                speed: Math.random() * 5 + 2,
                length: Math.random() * 20 + 10,
                size: Math.random() * 2 + 1
            };
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            
            if (particleType !== 'none') {
                ctx.fillStyle = particleType === 'snow' ? 'rgba(255,255,255,0.8)' : 
                                particleType === 'rain' ? 'rgba(174, 194, 224, 0.5)' : 
                                'rgba(255, 100, 0, 0.6)';

                particles.forEach(p => {
                    ctx.beginPath();
                    
                    if (particleType === 'rain') {
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x, p.y + p.length);
                        ctx.strokeStyle = ctx.fillStyle;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        p.y += p.speed * 2;
                    } else if (particleType === 'snow') {
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        p.y += p.speed * 0.5;
                        p.x += Math.sin(p.y * 0.01) * 0.5;
                    } else if (particleType === 'embers') {
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        p.y -= p.speed;
                        p.x += (Math.random() - 0.5) * 2;
                    }

                    // Reset if out of bounds
                    if (p.y > height) { p.y = -20; p.x = Math.random() * width; }
                    if (p.y < 0) { p.y = height + 20; p.x = Math.random() * width; }
                });
            }

            requestAnimationFrame(animateParticles);
        }
    </script>
</body>
</html>
